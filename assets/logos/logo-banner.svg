<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 35" width="230" height="35">
  <defs>
    <linearGradient id="bpG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Compact synapse icon -->
  <g transform="translate(3, 5)">
    <!-- Left neuron -->
    <circle cx="6" cy="14" r="5" fill="#6366f1" opacity="0.9"/>
    <circle cx="6" cy="14" r="3" fill="#818cf8"/>
    <!-- Dendrites left -->
    <line x1="3" y1="8" x2="1" y2="4" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="6" y1="9" x2="6" y2="4" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="9" y1="10" x2="12" y2="5" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Axon -->
    <path d="M 11 14 C 15 14, 15 7, 18 7" stroke="url(#bpG)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Gap -->
    <circle cx="20" cy="7" r="1.5" fill="#10b981" opacity="0.5"/>
    <!-- Axon right -->
    <path d="M 22 7 C 25 7, 25 14, 29 14" stroke="url(#bpG)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Right neuron -->
    <circle cx="34" cy="14" r="5" fill="#06b6d4" opacity="0.9"/>
    <circle cx="34" cy="14" r="3" fill="#22d3ee"/>
    <!-- Dendrites right -->
    <line x1="37" y1="10" x2="39" y2="5" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="34" y1="9" x2="34" y2="4" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="31" y1="8" x2="28" y2="4" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Medical cross -->
    <g transform="translate(19, 18)">
      <rect x="-1" y="-3" width="2" height="6" fill="#10b981" rx="0.5"/>
      <rect x="-2.5" y="-1.5" width="5" height="2" fill="#10b981" rx="0.5"/>
    </g>
  </g>

  <!-- Text: PatientSynapse -->
  <text x="46" y="24" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#1e293b">
    Patient<tspan fill="#6366f1">Synapse</tspan>
  </text>
</svg>
