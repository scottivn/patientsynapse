<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 185 35" width="185" height="35">
  <!-- Icon: compact bridge + medical cross -->
  <g transform="translate(3, 4)">
    <!-- Left pillar -->
    <rect x="0" y="11" width="4" height="14" fill="#2563eb" rx="1"/>
    <!-- Right pillar -->
    <rect x="24" y="11" width="4" height="14" fill="#2563eb" rx="1"/>
    <!-- Bridge arch -->
    <path d="M 2 11 Q 14 1, 26 11" stroke="#0ea5e9" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Medical cross on arch -->
    <g transform="translate(14, 6)">
      <rect x="-1.5" y="-4" width="3" height="8" fill="#10b981" rx="0.5"/>
      <rect x="-4" y="-1.5" width="8" height="3" fill="#10b981" rx="0.5"/>
    </g>
  </g>

  <!-- Text: PatientBridge -->
  <text x="38" y="24" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1e293b">
    Patient<tspan fill="#2563eb">Bridge</tspan>
  </text>
</svg>
