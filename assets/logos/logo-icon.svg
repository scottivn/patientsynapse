<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Round background -->
  <circle cx="40" cy="40" r="38" fill="#2563eb" opacity="0.1"/>
  
  <!-- Bridge Icon Centered -->
  <g transform="translate(17, 20)">
    <!-- Left pillar -->
    <rect x="0" y="25" width="8" height="25" fill="#2563eb" rx="2"/>
    <!-- Right pillar -->
    <rect x="38" y="25" width="8" height="25" fill="#2563eb" rx="2"/>
    
    <!-- Bridge arch -->
    <path d="M 4 25 Q 23 8, 42 25" stroke="#0ea5e9" stroke-width="7" fill="none" stroke-linecap="round"/>
    
    <!-- Medical cross on bridge -->
    <g transform="translate(23, 18)">
      <rect x="-3" y="-9" width="6" height="18" fill="#10b981" rx="1.5"/>
      <rect x="-7.5" y="-4.5" width="15" height="6" fill="#10b981" rx="1.5"/>
    </g>
    
    <!-- Connection pulse effect -->
    <circle cx="-6" cy="37" r="3" fill="#0ea5e9" opacity="0.7"/>
    <circle cx="52" cy="37" r="3" fill="#0ea5e9" opacity="0.7"/>
  </g>
</svg>
