<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="synGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Synapse Icon -->
  <g transform="translate(18, 16)">
    <!-- Left neuron body -->
    <circle cx="12" cy="42" r="12" fill="#6366f1" opacity="0.9"/>
    <circle cx="12" cy="42" r="7" fill="#818cf8"/>
    
    <!-- Left dendrites -->
    <line x1="4" y1="28" x2="0" y2="20" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="12" y1="30" x2="12" y2="20" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="20" y1="32" x2="26" y2="22" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Axon (connection arc) -->
    <path d="M 24 42 C 36 42, 38 24, 50 24" stroke="url(#pulseGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Synaptic gap — electric signal -->
    <line x1="50" y1="24" x2="56" y2="24" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 3"/>
    <circle cx="53" cy="24" r="3" fill="#10b981" opacity="0.5"/>
    
    <!-- Right axon terminal -->
    <path d="M 56 24 C 62 24, 64 42, 76 42" stroke="url(#pulseGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Right neuron body -->
    <circle cx="88" cy="42" r="12" fill="#06b6d4" opacity="0.9"/>
    <circle cx="88" cy="42" r="7" fill="#22d3ee"/>
    
    <!-- Right dendrites -->
    <line x1="96" y1="32" x2="100" y2="22" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="88" y1="30" x2="88" y2="20" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="80" y1="28" x2="74" y2="20" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Medical cross centered below gap -->
    <g transform="translate(50, 50)">
      <rect x="-2" y="-7" width="4" height="14" fill="#10b981" rx="1"/>
      <rect x="-5" y="-3.5" width="10" height="4" fill="#10b981" rx="1"/>
    </g>
    
    <!-- Signal particles -->
    <circle cx="35" cy="34" r="1.5" fill="#10b981" opacity="0.7"/>
    <circle cx="44" cy="26" r="1.5" fill="#10b981" opacity="0.9"/>
    <circle cx="62" cy="26" r="1.5" fill="#10b981" opacity="0.9"/>
    <circle cx="70" cy="34" r="1.5" fill="#10b981" opacity="0.7"/>
  </g>

  <!-- Text: PatientSynapse -->
  <text x="135" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700" fill="#1e293b">
    Patient<tspan fill="#6366f1">Synapse</tspan>
  </text>

  <!-- Tagline -->
  <text x="135" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="12.5" fill="#64748b" letter-spacing="0.5">
    Intelligent Connections Between Every Point of Care
  </text>
</svg>
